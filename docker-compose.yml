services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: casecellshop
      POSTGRES_USER: casecellshop
      POSTGRES_PASSWORD: casecellshop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casecellshop -d casecellshop"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: casecellshop
      RABBITMQ_DEFAULT_PASS: casecellshop
    ports:
      - "5672:5672"
      - "15672:15672"
